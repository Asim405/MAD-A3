<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopSphere | Product Listing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero-bar">
    <div>
      <div class="logo">ShopSphere</div>
      <p class="tagline">Modern products, effortless browsing.</p>
    </div>
    <div class="hero-actions">
      <span class="cart-icon">🛒</span>
      <span class="cart-badge">0</span>
    </div>
  </header>

  <main class="page-shell">
    <section class="hero-panel">
      <div>
        <h1>Discover your next favorite product</h1>
        <p>Shop curated picks with clean design, real-time search, and an intuitive product grid.</p>
      </div>
      <div class="search-panel">
        <label for="searchInput">Search products</label>
        <input id="searchInput" type="text" placeholder="Search by name..." />
      </div>
    </section>

    <section class="products-grid" id="productsGrid"></section>
  </main>

  <script>
    const productsGrid = document.getElementById('productsGrid');
    const searchInput = document.getElementById('searchInput');
    let products = [];

    async function loadProducts() {
      try {
        const response = await fetch('/products');
        products = await response.json();
        renderProducts(products);
      } catch (error) {
        productsGrid.innerHTML = '<p class="error-message">Unable to load products. Please try again later.</p>';
      }
    }

    function renderProducts(items) {
      if (!items.length) {
        productsGrid.innerHTML = '<p class="empty-state">No products match your search.</p>';
        return;
      }

      productsGrid.innerHTML = items.map(product => {
        const stockLabel = product.stock > 0 ? 'In Stock' : 'Out of Stock';
        const stockClass = product.stock > 0 ? 'badge in-stock' : 'badge out-of-stock';

        return `
          <article class="product-card">
            <div class="card-badge ${stockClass}">${stockLabel}</div>
            <h2>${product.product_name}</h2>
            <p class="price">$${product.price.toFixed(2)}</p>
            <p class="stock-count">${product.stock} available</p>
            <button class="add-button">Add to Cart</button>
          </article>
        `;
      }).join('');
    }

    searchInput.addEventListener('input', () => {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = products.filter(product => product.product_name.toLowerCase().includes(query));
      renderProducts(filtered);
    });

    loadProducts();
  </script>
</body>
</html>
