<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">📦</div>
        <div>
          <h1>Inventory HQ</h1>
          <p>Warehouse Tracking</p>
        </div>
      </div>
      <nav class="nav-menu">
        <a class="nav-link active" href="#">Dashboard</a>
        <a class="nav-link" href="#inventory-section">Stock List</a>
        <a class="nav-link" href="#">Reports</a>
        <a class="nav-link" href="#">Settings</a>
      </nav>
    </aside>

    <main class="main-panel">
      <header class="hero-bar">
        <div>
          <p class="eyebrow">Inventory Management</p>
          <h2>Stock overview</h2>
        </div>
      </header>

      <section class="content-card" id="inventory-section">
        <div class="content-header">
          <div>
            <h3>Current Inventory</h3>
            <p>Live inventory data fetched from the server.</p>
          </div>
          <div class="search-wrapper">
            <label for="searchInput">Search items</label>
            <input id="searchInput" type="search" placeholder="Filter by name..." />
          </div>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="inventoryTableBody">
              <tr><td colspan="3" class="loading">Loading inventory...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
